# docker-compose.yml
# Arquitetura: API (Python) + Frontend (Nginx) + SQLite via volume persistente

services:

  # ── Banco de Dados (SQLite via volume) ──────────────────────────────────────
  # SQLite não é um servidor — é um arquivo. O "serviço" aqui é apenas
  # o volume compartilhado entre API e potencialmente o frontend.
  # Não precisamos de um container separado para o SQLite.

  # ── API Python ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: pipeline_api
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PATH=/data/pipeline.db          # Caminho do SQLite dentro do container
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY} # Vem do .env (nunca hardcoded)
    volumes:
      - db_data:/data                      # Volume persistente para o SQLite
      - ./api:/app                         # Hot-reload em dev (remova em prod se quiser imagem pura)
    ports:
      - "8000:8000"
    networks:
      - pipeline_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pipeline_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html   # Volume para refletir mudanças em tempo real
    ports:
      - "80:80"
    networks:
      - pipeline_net
    depends_on:
      api:
        condition: service_healthy

# ── Volumes Persistentes ─────────────────────────────────────────────────────
# O volume db_data sobrevive a restarts e rebuilds de containers.
# Para fazer backup: docker run --rm -v db_data:/data -v $(pwd):/backup \
#                    alpine tar czf /backup/db_backup.tar.gz /data
volumes:
  db_data:
    driver: local

# ── Rede Interna ─────────────────────────────────────────────────────────────
networks:
  pipeline_net:
    driver: bridge