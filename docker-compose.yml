# docker-compose.yml
# Arquitetura: api (ingestor perene, baseado no projeto_modelo do professor)
# + frontend (dashboard Streamlit), lendo o mesmo datalake (SQLite de
# controle + Parquet Bronze/Silver/Gold) via volume persistente.

services:

  # ── Ingestor (descoberta + transcrição + pipeline Bronze→Silver→Gold) ───────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: doctrend_api
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY} # Vem do .env (nunca hardcoded)
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - datalake_data:/app/datalake        # SQLite de controle + Parquet (bronze/silver/gold)
    networks:
      - doctrend_net
    healthcheck:
      test: ["CMD", "test", "-f", "/app/datalake/control/ingestion.db"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Dashboard (Streamlit, lê o mesmo datalake) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doctrend_frontend
    restart: unless-stopped
    volumes:
      - datalake_data:/app/datalake:ro     # somente leitura — quem escreve é o api
    expose:
      - "8501"
    networks:
      - doctrend_net
    depends_on:
      api:
        condition: service_healthy

# ── Volumes Persistentes ─────────────────────────────────────────────────────
# O volume datalake_data sobrevive a restarts e rebuilds de containers.
# Para fazer backup: docker run --rm -v datalake_data:/data -v $(pwd):/backup \
#                    alpine tar czf /backup/datalake_backup.tar.gz /data
volumes:
  datalake_data:
    driver: local

# ── Rede Interna ─────────────────────────────────────────────────────────────
networks:
  doctrend_net:
    driver: bridge