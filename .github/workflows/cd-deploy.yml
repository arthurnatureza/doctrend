# .github/workflows/cd-deploy.yml
# Dispara automaticamente após merge na main.
# Faz deploy na VPS Hostinger via SSH + Rsync com mínimo downtime.

name: CD — Deploy Automático VPS

on:
  push:
    branches:
      - main       # Só roda quando um PR é mergeado na main

jobs:
  deploy:
    name: Deploy para VPS Hostinger
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout com histórico completo (necessário para rsync detectar mudanças)
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Configura chave SSH para acesso à VPS
      - name: Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      # 3. Adiciona a VPS como host conhecido (evita prompt interativo)
      - name: Adicionar VPS ao known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # 4. Sincroniza arquivos com a VPS via Rsync
      #    --delete: remove arquivos que não existem mais no repo
      #    --exclude: não sobrescreve dados persistentes nem arquivos sensíveis
      - name: Sincronizar código com VPS (Rsync)
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='*.env' \
            --exclude='.env*' \
            --exclude='data/' \
            --exclude='*.db' \
            --exclude='*.sqlite' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_PATH }}/

      # 5. Deploy: rebuild sempre.
      #    O rsync exclui .git/ do destino, então não há histórico git na VPS
      #    para detectar "o que mudou" — qualquer lógica baseada em `git log`
      #    ali é ilusória (silenciosamente vira no-op depois do 1º deploy,
      #    que só builda porque a imagem ainda não existe). Ambos os serviços
      #    (api e frontend) copiam o código para dentro da imagem — não tem
      #    bind-mount em produção — então rebuildar os dois a cada push é o
      #    único jeito confiável de garantir que o código em produção bate
      #    com o que está na main. Com cache de camadas do Docker, isso é
      #    rápido quando só o código da aplicação mudou.
      - name: Deploy (rebuild completo)
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.VPS_APP_PATH }}

            echo "=== Carregando variáveis de ambiente ==="
            # O arquivo .env deve existir na VPS (não é versionado no Git)
            # Ele é criado manualmente uma única vez conforme configuracao-vps.md
            if [ -f .env ]; then
              export $(grep -v '^#' .env | xargs)
            fi

            echo "=== Rebuild e restart (api + frontend) ==="
            docker compose up -d --build --remove-orphans

            echo "=== Limpando imagens antigas ==="
            docker image prune -f --filter "until=24h"

            echo "=== Status dos containers ==="
            docker compose ps

            echo "=== Deploy concluído com sucesso! ==="
          ENDSSH

      # 6. Notifica em caso de falha (opcional — pode remover se não quiser)
      - name: Notificar falha
        if: failure()
        run: |
          echo "::error::Deploy falhou! Verifique os logs acima."
          echo "Dica: conecte-se à VPS e rode 'docker compose logs' para diagnóstico."