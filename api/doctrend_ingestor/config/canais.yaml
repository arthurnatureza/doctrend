# Parametros globais do ingestor
global:
  idiomas_legenda: ["pt", "pt-BR", "en"]
  # Modo demo: ignora a API real e gera dados sinteticos deterministicos.
  # Com os 10 canais reais acima e a YOUTUBE_API_KEY configurada na VPS, roda
  # em modo real (false). Volte pra true se precisar testar sem gastar cota.
  modo_demo: false
  # So considera videos publicados nos ultimos N dias a partir de quando o
  # canal foi adicionado (ou do ultimo watermark salvo). Comece enxuto (15) —
  # de pra reduzir (ex.: 3) se o volume inicial de dados/Parquet ficar pesado.
  janela_descoberta_dias: 15
  # Vocabulario global (doencas/sintomas/temas de saude) usado no Gold para
  # medir densidade de mencoes. Canais individuais podem sobrescrever com seu
  # proprio campo "vocabulario:" se algum tiver um foco muito especifico.
  vocabulario:
    - "diabetes"
    - "hipertensão"
    - "colesterol"
    - "obesidade"
    - "depressão"
    - "ansiedade"
    - "insônia"
    - "enxaqueca"
    - "gastrite"
    - "refluxo"
    - "intestino"
    - "constipação"
    - "artrite"
    - "osteoporose"
    - "câncer"
    - "avc"
    - "infarto"
    - "arritmia"
    - "tireoide"
    - "anemia"
    - "endometriose"
    - "menopausa"
    - "fibromialgia"
    - "sedentarismo"
    - "tabagismo"
    - "estresse"
    - "alzheimer"
    - "coluna"
