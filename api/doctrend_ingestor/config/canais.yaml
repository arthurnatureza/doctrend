# =============================================================================
# Configuracao declarativa da ingestao perene — dominio Saude.
# A FREQUENCIA de cada canal e decisao de NEGOCIO, nao de codigo.
#
# Para adicionar um canal: copie um bloco abaixo, troque nome/channel_id, commit
# + push. O canal passa a ser consultado a partir do proximo deploy, trazendo os
# videos publicados dentro de "global.janela_descoberta_dias".
# Para remover: apague (ou marque "ativo: false") o bloco e faça commit + push.
# Isso NAO apaga o historico ja coletado no datalake — so para de coletar novo.
#
# Channel_id nao tem? Rode (gasta 1 unidade de cota por canal):
#   python -m doctrend_ingestor.scripts.resolver_handle @nomedocanal
# =============================================================================

